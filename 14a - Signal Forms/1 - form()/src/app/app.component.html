<h1>Sign In</h1>

<form novalidate>
  <label>
    Email
    <input type="email" [formField]="loginForm.email" />
  </label>

  <label>
    Password
    <input type="password" [formField]="loginForm.password" />
  </label>
</form>

<p>Email: {{ loginModel().email }}</p>
<p>Password: {{ loginModel().password }}</p>

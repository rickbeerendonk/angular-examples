<h1>NgOptimizedImage — Fill Mode</h1>
<p>
  Use <code>fill</code> when the image must cover its container. The parent must
  have <code>position: relative</code> and an explicit size.
</p>

<div style="position: relative; width: 100%; height: 300px">
  <img
    ngSrc="https://picsum.photos/id/1018/1200/800"
    fill
    alt="Full-width cover image"
    style="object-fit: cover"
  />
</div>

<p style="margin-top: 16px">
  No <code>width</code> or <code>height</code> attributes needed — the image
  fills the container.
</p>
